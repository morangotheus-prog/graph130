
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimazing Images</title>
    <link href="../styles/nav.css" rel="stylesheet" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cal+Sans&family=Oswald:wght@200..700&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Special+Elite&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cal+Sans&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Oswald:wght@200..700&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        .loki{
            background-color: rgb(145, 164, 137);
            width: 700px;
            padding: 7px;
            margin: 5px;
            float: left;
        }

        .leroy{
            display: inline-block;
            vertical-align: top;
            margin-left: 5px;
            color: rgb(255, 255, 255);
            font-family: "Mulish", sans-serif;
            
        }

        .clear{
            clear: both;
        }

        h1 { 
            color: rgb(57, 106, 78);
            font-family: "Cal Sans", sans-serif;
        } 

        .leo {
            background-color: rgb(223, 233, 220);
            padding: 0px 5px 5px 0px;
        }

        .leo img {
            vertical-align: top;
            margin: 10px 5px 3px 6px;   
        }

    </style>
</head>
<body>
    <h1>Optimizing Images</h1>
<article class="loki">
        <img src="../images/80.jpg" alt="80 percent jpg sample" width="500" height="auto">
        <section class="leroy">
            <p>80% JPG - 44.12K<br>Quality Very High</p>
        </section>
    </article>
    <article class="loki">
        <img src="../images/40.jpg" alt="40 percent jpg sample" width="500" height="auto">
        <section class="leroy">
            <p>40% JPG - 15.14K<br>
            Quality Medium</p>
        </section>
    </article>
    <article class="loki">
        <img src="../images/256.gif" alt="256 color gif sample" width="500" height="auto">
        <section class="leroy">
            <p>256 Color GIF - 137.1k<br>
              Quality Medium<br>
            <br></p>
      </section>
</article>
    <article class="loki">
        <img src="../images/64.gif" alt="64 color gif sample" width="500" height="auto">
        <section class="leroy">
            <p>64 Color GIF - 97.76K<br>
            Quality Low</p>
      </section>
</article>
    <article class="loki">
        <img src="../images/8.gif" alt="8 color gif sample" width="500" height="auto">
        <section class="leroy">
            <p>8 Color GIF - 48.81K<br>
              Quality Very Low              <br>
            <br></p>
        </section>
    </article>
    <article class="loki">
        <img src="../images/24.png" alt="PNG 24 sample" width="500" height="auto">
        <section class="leroy">
            <p>PNG 24 - 290.4K<br>
            Quality Good</p>
        </section>
    </article>
        <div class="clear"></div> 
        <article class="leo">
            <img src="../images/bridge.jpg" alt="bridge image" width="400" height="auto">
            <img src="../images/car.jpg" alt="car image" width="400" height="auto">
            <img src="../images/field.jpg" alt="field image" width="400" height="auto">
            <img src="../images/lake.jpg" alt="lake image" width="400" height="auto">
            <img src="../images/moon.jpg" alt="moon image" width="400" height="auto">
            <img src="../images/mountain.jpg" alt="mountain image" width="400" height="auto">
            <img src="../images/outono.jpg" alt="fall image" width="400" height="auto">
            <img src="../images/river-bridge.jpg" alt="river bridge image" width="400" height="auto">
            <img src="../images/snow.jpg" alt="snow image" width="400" height="auto">
            <img src="../images/rainbow.jpg" alt="rainbow image" width="400" height="auto">
            
        </article>
    
   
    
</body>
</html>
